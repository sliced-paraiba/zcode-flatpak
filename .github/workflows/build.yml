name: Build & publish

# Builds the flatpak and publishes it to a GitHub-Pages-hosted OSTree repo that
# users add directly:
#
#   flatpak remote-add --user --no-gpg-verify zcode \
#       https://sliced-paraiba.github.io/zcode-flatpak/repo
#   flatpak install --user zcode ai.zcode.ZCode
#
# Triggers on manifest/appdata changes, nightly, and manually.

on:
  push:
    branches: [main]
    paths:
      - ai.zcode.ZCode.yaml
      - ai.zcode.ZCode.appdata.xml
      - .github/workflows/build.yml
  schedule:
    # 04:15 UTC daily — rebuild even if nothing changed (keeps runtime fresh).
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: build-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flatpak tooling
        run: |
          sudo add-apt-repository -y ppa:flatpak/stable || true
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder ostree
          flatpak --version
          flatpak-builder --version

      - name: Add flathub remote & install runtime/sdk
        run: |
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      - name: Restore OSTree repo cache
        uses: actions/cache/restore@v4
        with:
          path: repo
          key: ostree-repo-${{ runner.os }}-${{ github.sha }}
          restore-keys: ostree-repo-${{ runner.os }}-

      - name: Build the flatpak
        run: |
          if [ ! -d repo/objects ]; then
            ostree init --repo=repo --mode=archive-z2
            ostree config --repo=repo set core.min-free-space-percent 0
          fi
          flatpak-builder \
            --force-clean \
            --user \
            --install-deps-from=flathub \
            --repo=repo \
            build-dir ai.zcode.ZCode.yaml

      - name: Prune OSTree repo
        run: flatpak build-update-repo --prune --prune-depth=14 repo || true

      - name: Build single-file .flatpak bundle
        run: |
          ver="$(grep -oE 'releases/[0-9.]+' ai.zcode.ZCode.yaml | head -1 | cut -d/ -f2)"
          flatpak build-bundle repo "ZCode-${ver}-x86_64.flatpak" ai.zcode.ZCode stable
          echo "VERSION=$ver" >> "$GITHUB_ENV"

      - name: Save OSTree repo cache
        uses: actions/cache/save@v4
        with:
          path: repo
          key: ostree-repo-${{ runner.os }}-${{ github.sha }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZCode-${{ env.VERSION }}-x86_64.flatpak
          path: ZCode-*-x86_64.flatpak
          if-no-files-found: error

      # ----- Publish OSTree repo + landing page to GitHub Pages -----
      - name: Prepare Pages payload
        run: |
          mkdir -p pages
          cp -a repo pages/repo
          cp .github/pages/index.html pages/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
