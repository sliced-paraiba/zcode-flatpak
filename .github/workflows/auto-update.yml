name: Auto-update

# Polls the upstream ZCode CDN hourly for a new Linux release. When a new version
# appears, the .github/scripts/check_update.py helper rewrites the flatpak
# manifest (URL + sha256) and the appdata <releases> section, then commits —
# which triggers build.yml to rebuild and republish.
#
# ZCode publishes a per-version latest-linux.yml on its CDN; the helper scrapes
# the website (which embeds every release URL) to find the newest version, then
# downloads the x86_64 .deb to compute the sha256 that flatpak-builder needs.

on:
  schedule:
    # Every hour, on the hour. (GitHub may delay cron runs under load.)
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new upstream release
        id: check
        run: |
          python3 .github/scripts/check_update.py | tee update.log
          # The script's last line is "changed=true|false".
          tail -1 update.log >> "$GITHUB_OUTPUT"

      - name: Commit bump
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "sliced-paraiba"
          git config user.email "sliced-paraiba@users.noreply.github.com"
          git add ai.zcode.ZCode.yaml ai.zcode.ZCode.appdata.xml
          git commit -m "chore: bump ZCode to $(grep -oE 'releases/[0-9.]+' ai.zcode.ZCode.yaml | head -1 | cut -d/ -f2)

          Auto-detected from the upstream CDN by the auto-update workflow.

          Assisted-by: ZCode:GLM-5.2"
          git push
